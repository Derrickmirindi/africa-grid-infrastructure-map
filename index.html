<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AfriGrid Atlas - Africa Grid Infrastructure Map</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
#panel { position: absolute; top: 12px; left: 12px; z-index: 1; background: rgba(17,17,17,0.85); color: #eee; padding: 14px 16px; border-radius: 10px; max-width: 240px; }
#panel h1 { font-size: 15px; margin: 0 0 8px; }
.layer-toggle { display: block; margin: 4px 0; font-size: 13px; }
#legend { margin-top: 10px; font-size: 12px; }
.legend-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
.swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
<h1>AfriGrid Atlas</h1>
<label class="layer-toggle"><input type="checkbox" id="toggle-plants" checked /> Power plants</label>
<label class="layer-toggle"><input type="checkbox" id="toggle-lines" checked /> Transmission lines</label>
<label class="layer-toggle"><input type="checkbox" id="toggle-substations" checked /> Substations</label>
<label class="layer-toggle"><input type="checkbox" id="toggle-datacenters" checked /> Data centers</label>
<div id="legend">
<div class="legend-row"><span class="swatch" style="background:#2ecc71"></span> &lt; $50/MWh</div>
<div class="legend-row"><span class="swatch" style="background:#f1c40f"></span> $50-$75/MWh</div>
<div class="legend-row"><span class="swatch" style="background:#e74c3c"></span> &gt; $75/MWh</div>
</div>
</div>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script type="module" src="./app.js"></script>
</body>
</html>
